<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TM Heart</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  font-family:Arial;
}

.heart{
  position:relative;
  width:200px;
  height:200px;
  background:red;
  transform:rotate(-45deg);
  animation:beat 1s infinite;
  display:flex;
  justify-content:center;
  align-items:center;
}

.heart::before,
.heart::after{
  content:"";
  position:absolute;
  width:200px;
  height:200px;
  background:red;
  border-radius:50%;
}

.heart::before{
  top:-100px;
  left:0;
}

.heart::after{
  left:100px;
  top:0;
}

.text{
  position:absolute;
  transform:rotate(45deg);
  color:white;
  font-size:40px;
  font-weight:bold;
}

@keyframes beat{
  0%{transform:rotate(-45deg) scale(1);}
  50%{transform:rotate(-45deg) scale(1.2);}
  100%{transform:rotate(-45deg) scale(1);}
}
</style>
</head>

<body>

<div class="heart">
  <div class="text">T.M</div>
</div>

</body>
</html>
